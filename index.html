<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO // OS v3.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030712;
            --panel: #0b1329;
            --panel-inner: #111c44;
            --accent: #00f0ff;
            --green: #10b981;
            --red: #ef4444;
            --text: #ffffff;
            --muted: #64748b;
            --glow: drop-shadow(0 0 12px var(--accent));
        }

        .light-mode {
            --bg: #f1f5f9;
            --panel: #ffffff;
            --panel-inner: #f8fafc;
            --text: #0f172a;
            --muted: #94a3b8;
            --glow: drop-shadow(0 4px 20px rgba(0, 240, 255, 0.25));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; transition: background-color 0.2s, color 0.2s; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        
        .app-wrapper { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 1rem; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 0.5rem; }
        .brand { font-weight: 900; font-size: 1.5rem; letter-spacing: 1px; background: linear-gradient(45deg, var(--accent), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-buttons { display: flex; gap: 8px; }
        .nav-btn { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); color: var(--text); padding: 0.6rem; border-radius: 50%; cursor: pointer; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; }

        .dashboard-display { background: var(--panel); border-radius: 32px; padding: 1.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); position: relative; }
        .speedometer { width: 180px; height: 180px; border: 4px dashed var(--accent); filter: var(--glow); border-radius: 50%; margin: 0 auto 1rem auto; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .speed-num { font-size: 4rem; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
        .speed-unit { font-size: 0.75rem; color: var(--accent); font-weight: 800; letter-spacing: 2px; margin-top: 2px; }
        .toggle-hint { font-size: 0.6rem; color: var(--muted); position: absolute; bottom: 15px; text-transform: uppercase; }

        .status-bar { display: inline-flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #f59e0b; margin-bottom: 1rem; padding: 0.4rem 1rem; background: rgba(0,0,0,0.2); border-radius: 99px; }
        .status-bar.online { color: var(--green); }
        .status-dot { width: 7px; height: 7px; background-color: currentColor; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-card { background: var(--panel-inner); padding: 0.7rem; border-radius: 16px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.02); }
        .stat-card i { color: var(--accent); margin-bottom: 4px; display: block; font-size: 0.9rem; }
        .stat-val { font-weight: 800; display: block; margin-top: 2px; font-size: 0.95rem; }

        .control-panel { background: var(--panel); border-radius: 28px; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 1rem; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; border: none; padding: 1rem; border-radius: 16px; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn:active { transform: scale(0.98); }
        .btn-demo { background: rgba(255, 255, 255, 0.04); border: 1px dashed rgba(255, 255, 255, 0.15); color: var(--text); box-shadow: none; }
        .btn-tune { background: linear-gradient(135deg, #059669, var(--green)); color: #000; font-weight: 800; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        
        .btn-panic { background: linear-gradient(135deg, #dc2626, var(--red)); color: white; font-weight: 900; letter-spacing: 1px; box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4); text-transform: uppercase; padding: 1.1rem; border: none; border-radius: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .mode-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mode-btn { background: var(--panel-inner); border: 1px solid rgba(255,255,255,0.05); color: var(--text); padding: 1rem 0.5rem; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 0.9rem; }
        .mode-btn.active { border-color: var(--accent); background: rgba(0, 240, 255, 0.08); color: var(--accent); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: var(--panel-inner); padding: 0.9rem 1.2rem; border-radius: 16px; font-weight: 700; font-size: 0.9rem; }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .log-box { background: #000; color: #a8ffb2; font-family: monospace; font-size: 0.72rem; padding: 0.8rem; border-radius: 16px; text-align: left; max-height: 85px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="brand"><i class="fa-solid fa-gauge-high"></i> NEXUS // PRO</div>
            <div class="nav-buttons">
                <button class="nav-btn" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </nav>

        <section class="dashboard-display">
            <div class="status-bar" id="statusIndicator"><div class="status-dot"></div><span id="statusText">Demo-Modus Aktiv</span></div>
            
            <div class="speedometer" id="speedRing">
                <span class="speed-num" id="speedo">20</span>
                <span class="speed-unit" id="unitText">KM/H</span>
                <span class="toggle-hint">Unit Swap</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><i class="fa-solid fa-battery-three-quarters"></i><span>Akku</span><span class="stat-val" id="batteryVal">98 %</span></div>
                <div class="stat-card"><i class="fa-solid fa-temperature-half"></i><span>ESC Temp</span><span class="stat-val" id="tempVal">24.5 °C</span></div>
                <div class="stat-card"><i class="fa-solid fa-road"></i><span>Distanz</span><span class="stat-val" id="rangeVal">45.2 km</span></div>
                <div class="stat-card"><i class="fa-solid fa-bolt"></i><span>Spannung</span><span class="stat-val" id="voltVal">40.2 V</span></div>
                <div class="stat-card"><i class="fa-solid fa-wave-square"></i><span>Strom</span><span class="stat-val" id="ampVal">4.2 A</span></div>
                <div class="stat-card"><i class="fa-solid fa-arrows-spin"></i><span>Zyklen</span><span class="stat-val" id="cyclesVal">14</span></div>
            </div>
        </section>

        <main class="control-panel">
            <button class="btn btn-panic" id="panicBtn"><i class="fa-solid fa-hand"></i> PANIC BUTTON (Instant 20 km/h)</button>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="DE" data-speed="20">DE (20)</button>
                <button class="mode-btn" data-mode="EU" data-speed="25">EU (25)</button>
                <button class="mode-btn" data-mode="US" data-speed="35" style="color: var(--red)">US (35)</button>
            </div>

            <div class="toggle-row">
                <span><i class="fa-solid fa-compass" style="color: var(--accent); margin-right: 8px;"></i> Tempomat (Cruise Control)</span>
                <label class="switch">
                    <input type="checkbox" id="cruiseCheck">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-tune" id="flashBtn"><i class="fa-solid fa-microchip"></i> Register beschreiben</button>

            <div class="btn-group">
                <button class="btn" id="connectBtn"><i class="fa-brands fa-bluetooth"></i> BLE Koppelung</button>
                <button class="btn btn-demo" id="resetSimBtn"><i class="fa-solid fa-rotate"></i> Reset Simulation</button>
            </div>

            <div class="log-box" id="logBox">> System geladen. Simulation läuft stabil...</div>
        </main>
    </div>

    <script>
        const SCOOTER_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const SCOOTER_WRITE_UUID   = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        let writeCharacteristic = null;
        let isDemoMode = true;
        let driveInterval = null;
        let currentUnit = 'kmh';
        let rawSpeedKmh = 20;
        let totalKmSimulated = 45.2;

        const speedo = document.getElementById('speedo');
        const speedRing = document.getElementById('speedRing');
        const unitText = document.getElementById('unitText');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const flashBtn = document.getElementById('flashBtn');
        const panicBtn = document.getElementById('panicBtn');
        const themeBtn = document.getElementById('themeBtn');
        const logBox = document.getElementById('logBox');
        const cruiseCheck = document.getElementById('cruiseCheck');
        const connectBtn = document.getElementById('connectBtn');
        const resetSimBtn = document.getElementById('resetSimBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        const batteryVal = document.getElementById('batteryVal');
        const tempVal = document.getElementById('tempVal');
        const rangeVal = document.getElementById('rangeVal');
        const voltVal = document.getElementById('voltVal');
        const ampVal = document.getElementById('ampVal');

        function log(msg) { logBox.innerHTML += `<br>> ${msg}`; logBox.scrollTop = logBox.scrollHeight; }

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeBtn.innerHTML = document.body.classList.contains('light-mode') ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        });

        speedRing.addEventListener('click', () => {
            currentUnit = currentUnit === 'kmh' ? 'mph' : 'kmh';
            unitText.innerText = currentUnit === 'kmh' ? 'KM/H' : 'MPH';
            log(`Einheit auf ${unitText.innerText} geändert.`);
            updateMetricsDisplay();
        });

        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (isDemoMode) startDemoDriving(parseInt(btn.getAttribute('data-speed')));
            });
        });

        cruiseCheck.addEventListener('change', () => {
            log(`Tempomat-Register: ${cruiseCheck.checked ? '0x01 (AKTIV)' : '0x00 (INAKTIV)'}`);
        });

        connectBtn.addEventListener('click', async () => {
            try {
                log("Öffne Bluetooth-Modul für ALLE sichtbaren Signale...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SCOOTER_SERVICE_UUID]
                });

                log(`Verbunden mit Gerät: ${device.name || "Unbekannte Hardware"}`);
                statusIndicator.className = "status-bar online";
                statusText.innerText = device.name || "Verbunden";
                isDemoMode = false;

                log("Lese GATT-Services aus...");
                const gattServer = await device.gatt.connect();
                const service = await gattServer.getPrimaryService(SCOOTER_SERVICE_UUID).catch(() => null);
                
                if (service) {
                    writeCharacteristic = await service.getCharacteristic(SCOOTER_WRITE_UUID).catch(() => null);
                    log("Passendes E-Scooter Firmware-Register gefunden!");
                } else {
                    log("Warnung: Keine kompatiblen Controller-Register auf diesem Gerät.");
                }

            } catch (err) {
                log(`Meldung: ${err.message}`);
            }
        });

        function buildPacket(register, value) {
            let payload = [0x55, 0xAA, 0x03, 0x20, register, value & 0xFF, (value >> 8) & 0xFF];
            let checksum = 0;
            for (let i = 2; i < payload.length; i++) checksum += payload[i];
            checksum = (checksum ^ 0xFFFF) & 0xFFFF;
            payload.push(checksum & 0xFF, (checksum >> 8) & 0xFF);
            return new Uint8Array(payload);
        }

        flashBtn.addEventListener('click', async () => {
            const activeMode = document.querySelector('.mode-btn.active');
            const targetSpeed = parseInt(activeMode.getAttribute('data-speed'));
            const modeName = activeMode.getAttribute('data-mode');

            flashBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Injektiere...';
            flashBtn.style.pointerEvents = 'none';

            if (isDemoMode) {
                log(`Simuliere Flash-Prozess auf Register 0x7c mit Wert: ${modeName}`);
                setTimeout(() => {
                    flashBtn.innerHTML = '<i class="fa-solid fa-microchip"></i> Register beschreiben';
                    flashBtn.style.pointerEvents = 'auto';
                    log(`Erfolgreich! Virtuelles Tempolimit auf ${targetSpeed} angehoben.`);
                    startDemoDriving(targetSpeed);
                }, 1200);
            } else {
                if (!writeCharacteristic) {
                    log("Fehler: Gerät besitzt kein beschreibbares Motor-Register.");
                    flashBtn.innerHTML = '<i class="fa-solid fa-microchip"></i> Register beschreiben';
                    flashBtn.style.pointerEvents = 'auto';
                    return;
                }
                let hexVal = modeName === "US" ? 0x03 : (modeName === "EU" ? 0x02 : 0x01);
                try {
                    await writeCharacteristic.writeValue(buildPacket(0x7c, hexVal));
                    log("Echte Firmware-Bytes erfolgreich übertragen!");
                } catch(e) { log(`Fehler beim Schreiben: ${e.message}`); }
                flashBtn.innerHTML = '<i class="fa-solid fa-microchip"></i> Register beschreiben';
                flashBtn.style.pointerEvents = 'auto';
            }
        });

        panicBtn.addEventListener('click', async () => {
            log("🚨 PANIK BUTTON GEKICKT: Überschreibe alle Tuning-Werte!");
            modeButtons.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-mode="DE"]').classList.add('active');
            
            if (isDemoMode) {
                startDemoDriving(20);
                log("Simulierter Scooter sofort gedrosselt.");
            } else {
                if (writeCharacteristic) {
                    try {
                        await writeCharacteristic.writeValue(buildPacket(0x7c, 0x01));
                        log("Hardware erfolgreich auf 20 km/h gelockt!");
                    } catch(e) { log("Hardware-Drosselung gescheitert!"); }
                }
            }
            alert("PANIK MODUS: Tuning entfernt! Scooter läuft jetzt mit legalen 20 km/h.");
        });

        function startDemoDriving(maxSpeed) {
            clearInterval(driveInterval);
            driveInterval = setInterval(() => {
                let target = maxSpeed + (Math.random() * 0.8 - 0.4);
                if (rawSpeedKmh < target - 1) rawSpeedKmh += 2.0;
                else if (rawSpeedKmh > target + 1) rawSpeedKmh -= 1.0;
                else rawSpeedKmh = target;

                totalKmSimulated += (rawSpeedKmh / 36000);
                updateMetricsDisplay();
                ampVal.innerText = (4 + Math.random() * 2.5).toFixed(1) + " A";
                tempVal.innerText = (24 + (rawSpeedKmh / 6)).toFixed(1) + " °C";
            }, 100);
        }

        function updateMetricsDisplay() {
            if (currentUnit === 'kmh') {
                speedo.innerText = Math.floor(rawSpeedKmh).toString().padStart(2, '0');
                rangeVal.innerText = totalKmSimulated.toFixed(1) + " km";
            } else {
                speedo.innerText = Math.floor(rawSpeedKmh * 0.621371).toString().padStart(2, '0');
                rangeVal.innerText = (totalKmSimulated * 0.621371).toFixed(1) + " mi";
            }
        }

        resetSimBtn.addEventListener('click', () => {
            rawSpeedKmh = 0;
            startDemoDriving(20);
            log("Fahrdaten-Simulation zurückgesetzt.");
        });

        startDemoDriving(20);
    </script>
</body>
</html>
